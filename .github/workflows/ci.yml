name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: legalmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/legalmind_test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Format check (ruff)
        working-directory: backend
        run: uv run ruff format --check .

      - name: Type check (mypy)
        working-directory: backend
        run: uv run mypy

      - name: Tests (pytest)
        working-directory: backend
        run: uv run pytest